<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Notes | NoteVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">

<nav class="bg-white shadow-sm border-b border-slate-200">
    <div class="max-w-7xl mx-auto px-4 py-4">
        <div class="flex justify-between items-center">
            <h1 class="text-2xl font-bold text-slate-800">My Notes</h1>
            <a href="{% url 'notes:create_note' %}" class="bg-teal-600 text-white px-4 py-2 rounded-lg hover:bg-teal-700">
                + New Note
            </a>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-4 py-8">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        {% for note in notes %}
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-md transition">
            <div class="p-5">
                <h3 class="text-lg font-bold text-slate-800 mb-2 line-clamp-1">{{ note.title }}</h3>
                <p class="text-slate-500 text-sm mb-3 line-clamp-3">{{ note.content|truncatechars:150 }}</p>
                <div class="flex justify-between items-center text-xs text-slate-400 mb-4">
                    <span>{{ note.created_at|date:"M d, Y" }}</span>
                    <span>{{ note.content|wordcount }} words</span>
                </div>
                <a href="{% url 'notes:note_detail' note.id %}" class="block text-center bg-teal-600 text-white py-2 rounded-lg hover:bg-teal-700 transition">
                    View Full Note →
                </a>
            </div>
        </div>
        {% empty %}
        <div class="col-span-full text-center py-12">
            <p class="text-slate-400">No notes yet. Create your first note!</p>
        </div>
        {% endfor %}
    </div>
</main>

</body>
</html>
