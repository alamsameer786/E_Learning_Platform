<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - CampusIQ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .signup-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .signup-card h3 {
            color: #333;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            transition: 0.3s;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
            outline: none;
        }
        .btn-signup {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
            transition: 0.3s;
        }
        .btn-signup:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }
        .alert {
            border-radius: 10px;
        }
        .password-strength {
            margin-top: 8px;
        }
        .strength-bar {
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
        }
        .strength-progress {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
<div class="signup-card">
    <div class="text-center mb-4">
        <i class="fas fa-graduation-cap fa-3x" style="color: #667eea;"></i>
        <h3 class="mt-2">Create Account</h3>
        <p class="text-muted">Join CampusIQ and start learning smarter</p>
    </div>
    
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}
    
    <form method="post" id="signupForm">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Username *</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Email (Optional)</label>
            <input type="email" name="email" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Password *</label>
            <input type="password" name="password1" id="password1" class="form-control" required>
            <div class="password-strength">
                <div class="strength-bar">
                    <div class="strength-progress" id="strengthProgress"></div>
                </div>
                <small class="text-muted" id="strengthText">Enter a password</small>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Confirm Password *</label>
            <input type="password" name="password2" id="password2" class="form-control" required>
            <small id="matchMsg" class="text-muted"></small>
        </div>
        <button type="submit" class="btn-signup">Create Account</button>
    </form>
    
    <div class="text-center mt-4">
        <p class="text-muted">Already have an account? <a href="{% url 'login' %}" style="color: #667eea;">Login</a></p>
    </div>
</div>

<script>
    // Password strength meter
    const passwordInput = document.getElementById('password1');
    const confirmInput = document.getElementById('password2');
    const strengthProgress = document.getElementById('strengthProgress');
    const strengthText = document.getElementById('strengthText');
    const matchMsg = document.getElementById('matchMsg');
    
    function checkPasswordStrength(password) {
        let strength = 0;
        if (password.length >= 8) strength++;
        if (password.match(/[a-z]+/)) strength++;
        if (password.match(/[A-Z]+/)) strength++;
        if (password.match(/[0-9]+/)) strength++;
        if (password.match(/[$@#&!]+/)) strength++;
        
        let width = (strength / 5) * 100;
        let color, text;
        
        switch(strength) {
            case 0: color = '#dc3545'; text = 'Very Weak'; break;
            case 1: color = '#dc3545'; text = 'Weak'; break;
            case 2: color = '#ffc107'; text = 'Fair'; break;
            case 3: color = '#17a2b8'; text = 'Good'; break;
            case 4: color = '#28a745'; text = 'Strong'; break;
            case 5: color = '#28a745'; text = 'Very Strong'; break;
            default: color = '#dc3545'; text = 'Very Weak';
        }
        
        strengthProgress.style.width = width + '%';
        strengthProgress.style.backgroundColor = color;
        strengthText.textContent = text;
        strengthText.style.color = color;
        return strength;
    }
    
    function checkPasswordMatch() {
        if (confirmInput.value.length > 0) {
            if (passwordInput.value === confirmInput.value) {
                matchMsg.innerHTML = '<i class="fas fa-check-circle" style="color: #28a745;"></i> Passwords match';
                matchMsg.style.color = '#28a745';
                return true;
            } else {
                matchMsg.innerHTML = '<i class="fas fa-times-circle" style="color: #dc3545;"></i> Passwords do not match';
                matchMsg.style.color = '#dc3545';
                return false;
            }
        } else {
            matchMsg.innerHTML = '';
            return false;
        }
    }
    
    passwordInput.addEventListener('input', function() {
        checkPasswordStrength(this.value);
        checkPasswordMatch();
    });
    
    confirmInput.addEventListener('input', checkPasswordMatch);
</script>
</body>
</html>
