<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CampusIQ</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        }

        .login-card h3 {
            font-weight: 600;
        }

        .form-control {
            border-radius: 10px;
            padding: 10px;
        }

        .btn-custom {
            border-radius: 30px;
            padding: 10px;
        }

        .link-text {
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

<div class="login-card">
    <h3 class="text-center mb-4">Welcome Back</h3>

    <form method="post">
        {% csrf_token %}

        <!-- Django Form -->
        {{ form.as_p }}

        <button type="submit" class="btn btn-primary w-100 btn-custom mt-2">
            Login
        </button>

        <div class="text-center mt-3">
            <a href="{% url 'signup' %}" class="link-text">
                Don't have an account? Sign Up
            </a>
        </div>
    </form>
</div>

</body>
</html>
